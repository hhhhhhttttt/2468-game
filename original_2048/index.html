<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 游戏</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
        }

        h1 {
            font-size: 4rem;
            font-weight: bold;
            color: #fff;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 15px;
        }

        .scores {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .score-box {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            color: #fff;
            padding: 12px 24px;
            border-radius: 8px;
            text-align: center;
            min-width: 90px;
            position: relative;
            overflow: hidden;
        }

        .score-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 3s infinite;
        }

        .score-box .label {
            font-size: 0.7rem;
            opacity: 0.8;
        }

        .score-box .value {
            font-size: 1.4rem;
            font-weight: bold;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            min-width: 80px;
            min-height: 44px;
        }

        .btn-primary {
            background: #fff;
            color: #667eea;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .game-container {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 10px;
            aspect-ratio: 1;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            width: 100%;
            height: 100%;
        }

        .tile {
            background: rgba(255,255,255,0.3);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(1.2rem, 7vw, 2rem);
            font-weight: bold;
            transition: all 0.15s ease;
            position: relative;
        }

        .tile-new {
            animation: appear 0.2s ease-out;
        }

        .tile-merged {
            animation: pop 0.3s ease-out;
        }

        .tile-2 { background: #eee4da; color: #776e65; }
        .tile-4 { background: #ede0c8; color: #776e65; }
        .tile-8 { background: #f2b179; color: #fff; }
        .tile-16 { background: #f59563; color: #fff; }
        .tile-32 { background: #f67c5f; color: #fff; }
        .tile-64 { background: #f65e3b; color: #fff; }
        .tile-128 { background: #edcf72; color: #fff; font-size: clamp(1rem, 5vw, 1.6rem); }
        .tile-256 { background: #edcc61; color: #fff; font-size: clamp(1rem, 5vw, 1.6rem); }
        .tile-512 { background: #edc850; color: #fff; font-size: clamp(1rem, 5vw, 1.6rem); }
        .tile-1024 { background: #edc53f; color: #fff; font-size: clamp(0.8rem, 4vw, 1.2rem); }
        .tile-2048 { background: #edc22e; color: #fff; font-size: clamp(0.8rem, 4vw, 1.2rem); }

        @keyframes appear {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        @keyframes float-up {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-50px); }
        }

        .floating-score {
            position: absolute;
            font-size: 1.5rem;
            font-weight: bold;
            color: #f65e3b;
            pointer-events: none;
            animation: float-up 0.5s ease-out forwards;
            z-index: 10;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 20;
        }

        .overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .overlay h2 {
            color: #fff;
            font-size: 2rem;
            margin-bottom: 15px;
        }

        .overlay p {
            color: #fff;
            font-size: 1.1rem;
            margin-bottom: 20px;
        }

        .instructions {
            margin-top: 15px;
            color: rgba(255,255,255,0.8);
            font-size: 0.85rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>2048</h1>
        
        <div class="scores">
            <div class="score-box">
                <div class="label">分数</div>
                <div class="value" id="score">0</div>
            </div>
            <div class="score-box">
                <div class="label">最高分</div>
                <div class="value" id="bestScore">0</div>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-primary" id="startBtn">开始游戏</button>
            <button class="btn btn-primary" id="restartBtn">重新开始</button>
        </div>

        <div class="game-container">
            <div class="game-grid" id="gameGrid"></div>
            <div class="overlay" id="overlay">
                <h2 id="overlayTitle">游戏结束</h2>
                <p id="overlayText">最终得分：<span id="finalScore">0</span></p>
                <button class="btn btn-primary" id="overlayBtn">再来一局</button>
            </div>
        </div>

        <div class="instructions">
            <p>使用键盘方向键↑↓←→ 控制方块移动</p>
            <p>合并相同数字达到2048获胜！</p>
        </div>
    </div>


    <script>
        class Game2048 {
            constructor() {
                this.size = 4;
                this.grid = [];
                this.score = 0;
                this.bestScore = parseInt(localStorage.getItem('bestScore') || '0');
                this.gameGrid = document.getElementById('gameGrid');
                this.scoreEl = document.getElementById('score');
                this.bestScoreEl = document.getElementById('bestScore');
                this.overlay = document.getElementById('overlay');
                this.init();
                this.setupEventListeners();
            }

            init() {
                this.grid = Array(this.size).fill(null).map(() => Array(this.size).fill(0));
                this.score = 0;
                this.addRandomTile();
                this.addRandomTile();
                this.render();
                this.updateScores();
                this.hideOverlay();
            }

            setupEventListeners() {
                document.addEventListener('keydown', (e) => this.handleKey(e));
                
                document.getElementById('startBtn').addEventListener('click', () => this.init());
                document.getElementById('restartBtn').addEventListener('click', () => this.init());
                document.getElementById('overlayBtn').addEventListener('click', () => this.init());
            }

            handleKey(e) {
                const keyMap = { ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right' };
                if (keyMap[e.key]) {
                    e.preventDefault();
                    this.move(keyMap[e.key]);
                }
            }

            addRandomTile() {
                const empty = [];
                for (let i = 0; i < this.size; i++) {
                    for (let j = 0; j < this.size; j++) {
                        if (this.grid[i][j] === 0) empty.push({ row: i, col: j });
                    }
                }
                if (empty.length > 0) {
                    const { row, col } = empty[Math.floor(Math.random() * empty.length)];
                    this.grid[row][col] = Math.random() < 0.9 ? 2 : 4;
                }
            }

            move(direction) {
                let moved = false;
                const merged = [];

                if (direction === 'left') {
                    for (let i = 0; i < this.size; i++) {
                        const arr = this.grid[i].filter(x => x !== 0);
                        const res = [];
                        for (let j = 0; j < arr.length; j++) {
                            if (j + 1 < arr.length && arr[j] === arr[j + 1]) {
                                res.push(arr[j] * 2);
                                this.score += arr[j] * 2;
                                merged.push({ row: i, col: res.length - 1, value: arr[j] * 2 });
                                j++;
                                moved = true;
                            } else {
                                res.push(arr[j]);
                            }
                        }
                        while (res.length < this.size) res.push(0);
                        if (JSON.stringify(this.grid[i]) !== JSON.stringify(res)) moved = true;
                        this.grid[i] = res;
                    }
                } else if (direction === 'right') {
                    for (let i = 0; i < this.size; i++) {
                        const arr = this.grid[i].filter(x => x !== 0);
                        const res = [];
                        for (let j = arr.length - 1; j >= 0; j--) {
                            if (j - 1 >= 0 && arr[j] === arr[j - 1]) {
                                res.unshift(arr[j] * 2);
                                this.score += arr[j] * 2;
                                merged.push({ row: i, col: this.size - res.length, value: arr[j] * 2 });
                                j--;
                                moved = true;
                            } else {
                                res.unshift(arr[j]);
                            }
                        }
                        while (res.length < this.size) res.unshift(0);
                        if (JSON.stringify(this.grid[i]) !== JSON.stringify(res)) moved = true;
                        this.grid[i] = res;
                    }
                } else if (direction === 'up') {
                    for (let j = 0; j < this.size; j++) {
                        const arr = [];
                        for (let i = 0; i < this.size; i++) arr.push(this.grid[i][j]);
                        const filtered = arr.filter(x => x !== 0);
                        const res = [];
                        for (let i = 0; i < filtered.length; i++) {
                            if (i + 1 < filtered.length && filtered[i] === filtered[i + 1]) {
                                res.push(filtered[i] * 2);
                                this.score += filtered[i] * 2;
                                merged.push({ row: res.length - 1, col: j, value: filtered[i] * 2 });
                                i++;
                                moved = true;
                            } else {
                                res.push(filtered[i]);
                            }
                        }
                        while (res.length < this.size) res.push(0);
                        for (let i = 0; i < this.size; i++) {
                            if (this.grid[i][j] !== res[i]) moved = true;
                            this.grid[i][j] = res[i];
                        }
                    }
                } else if (direction === 'down') {
                    for (let j = 0; j < this.size; j++) {
                        const arr = [];
                        for (let i = 0; i < this.size; i++) arr.push(this.grid[i][j]);
                        const filtered = arr.filter(x => x !== 0);
                        const res = [];
                        for (let i = filtered.length - 1; i >= 0; i--) {
                            if (i - 1 >= 0 && filtered[i] === filtered[i - 1]) {
                                res.unshift(filtered[i] * 2);
                                this.score += filtered[i] * 2;
                                merged.push({ row: this.size - res.length, col: j, value: filtered[i] * 2 });
                                i--;
                                moved = true;
                            } else {
                                res.unshift(filtered[i]);
                            }
                        }
                        while (res.length < this.size) res.unshift(0);
                        for (let i = 0; i < this.size; i++) {
                            if (this.grid[i][j] !== res[i]) moved = true;
                            this.grid[i][j] = res[i];
                        }
                    }
                }

                if (moved) {
                    this.addRandomTile();
                    this.render(merged);
                    this.updateScores();
                    this.checkGameState();
                }
            }

            render(merged = []) {
                const oldTiles = this.gameGrid.querySelectorAll('.tile');
                const oldValues = [];
                oldTiles.forEach(t => oldValues.push(parseInt(t.dataset.value) || 0));

                this.gameGrid.innerHTML = '';
                const newTiles = [];
                const mergedTiles = [];

                let idx = 0;
                for (let i = 0; i < this.size; i++) {
                    for (let j = 0; j < this.size; j++) {
                        const value = this.grid[i][j];
                        const tile = document.createElement('div');
                        tile.className = `tile ${value > 0 ? `tile-${value}` : ''}`;
                        tile.dataset.value = value;
                        tile.textContent = value || '';

                        if (value > 0 && (idx >= oldValues.length || oldValues[idx] === 0)) {
                            newTiles.push(tile);
                        }

                        const isMerged = merged.some(m => m.row === i && m.col === j);
                        if (isMerged) {
                            mergedTiles.push(tile);
                        }

                        this.gameGrid.appendChild(tile);
                        idx++;
                    }
                }

                setTimeout(() => {
                    newTiles.forEach(t => t.classList.add('tile-new'));
                    mergedTiles.forEach(t => t.classList.add('tile-merged'));

                    merged.forEach(m => {
                        const tile = this.gameGrid.children[m.row * this.size + m.col];
                        if (tile) {
                            const fs = document.createElement('div');
                            fs.className = 'floating-score';
                            fs.textContent = `+${m.value}`;
                            fs.style.left = `${tile.offsetWidth / 2 - 20}px`;
                            fs.style.top = `${-10}px`;
                            tile.appendChild(fs);
                            setTimeout(() => fs.remove(), 500);
                        }
                    });
                }, 10);
            }

            updateScores() {
                this.scoreEl.textContent = this.score;
                if (this.score > this.bestScore) {
                    this.bestScore = this.score;
                    localStorage.setItem('bestScore', this.bestScore.toString());
                }
                this.bestScoreEl.textContent = this.bestScore;
            }

            checkGameState() {
                let won = false;
                let lost = true;

                for (let i = 0; i < this.size; i++) {
                    for (let j = 0; j < this.size; j++) {
                        if (this.grid[i][j] === 2048) won = true;
                        if (this.grid[i][j] === 0) lost = false;
                        if (j + 1 < this.size && this.grid[i][j] === this.grid[i][j + 1]) lost = false;
                        if (i + 1 < this.size && this.grid[i][j] === this.grid[i + 1][j]) lost = false;
                    }
                }

                if (won) {
                    this.showOverlay('你赢了！', true);
                } else if (lost) {
                    this.showOverlay('游戏结束', false);
                }
            }

            showOverlay(title, isWin) {
                document.getElementById('overlayTitle').textContent = title;
                document.getElementById('overlayTitle').style.color = isWin ? '#4ade80' : '#fff';
                document.getElementById('finalScore').textContent = this.score;
                this.overlay.classList.add('show');
            }

            hideOverlay() {
                this.overlay.classList.remove('show');
            }
        }

        const game = new Game2048();
    </script>
</body>
</html>
